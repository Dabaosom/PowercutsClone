name: Build PowercutsClone

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Download iOS 17.0 SDK
        run: |
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          # 使用 MagicFoundation 的 SDK
          curl -L -o sdk.zip "https://github.com/MagicFoundation/PlatformSDKs/raw/main/iPhoneOS17.0.sdk.zip" || \
          curl -L -o sdk.zip "https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz"
          unzip sdk.zip || tar -xJf sdk.zip || true
          ls -la
          
      - name: Build Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make clean
          make PACKAGE_VERSION=1.0.${{ github.run_number }}
          
      - name: Package DEB
        run: |
          cd $GITHUB_WORKSPACE
          make package
          
      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowercutsClone-DEB
          path: packages/*.deb
          retention-days: 30
          
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
