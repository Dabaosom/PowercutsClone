name: Build PowercutsClone DEB

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid

      - name: Install roothide theos (with submodules)
        run: |
          export THEOS=$HOME/theos
          if [ -d "$THEOS" ] && [ -f "$THEOS/vendor/mod/roothide/package.mk" ]; then
            echo 'THEOS already has roothide scheme'
          else
            rm -rf "$THEOS"
            git clone --depth=1 https://github.com/roothide/theos.git $THEOS
            cd $THEOS && git submodule update --init --depth=1
          fi
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Build Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make clean
          make package PACKAGE_VERSION=1.1.${{ github.run_number }} 2>&1 | tail -30

      - name: Show build output
        run: |
          ls -la packages/ 2>/dev/null || echo "No packages dir"
          ls -lh packages/*.deb 2>/dev/null || echo "No deb found"

      - name: Upload DEB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PowercutsClone-DEB
          path: packages/*.deb
          retention-days: 30
